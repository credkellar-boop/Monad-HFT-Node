name: Alpha-One Integrity Check

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
      
    # FIXED: The runner now points to the src directory where Cargo.toml lives
    - name: Rust Syntax Check
      working-directory: ./src
      run: cargo check --verbose

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Python Dependencies
      run: |
        if [ -f requirements.txt ]; then
          pip install -r requirements.txt
        fi

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'

    - name: Go Build Check
      run: |
        if [ -d "go-control" ]; then
          go build ./go-control/...
        else
          echo "Go directory not found, skipping."
        fi
