name: Alpha-One Integrity Check

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  # Fixes Node.js 20 deprecation warning
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # 1. Python Setup
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install Python Dependencies
      run: |
        if [ -f requirements.txt ]; then
          pip install -r requirements.txt
        fi

    # 2. Rust Setup (Fixed dtolnay path)
    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
    - name: Rust Syntax Check
      run: |
        if [ -f "Cargo.toml" ]; then
          cargo check --verbose
        else
          echo "Cargo.toml not in root. Skipping..."
        fi

    # 3. Go Setup (Fixed Directory & Main check)
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'
    - name: Go Build Check
      run: |
        if [ -d "go-control" ]; then
          cd go-control
          # Initialize module if it doesn't exist
          [ ! -f go.mod ] && go mod init go-control
          # Tidy up dependencies
          go mod tidy
          # Build only the current directory to avoid multiple 'main' errors
          go build .
        else
          echo "go-control folder not found."
        fi

    # 4. Final Audit Simulation
    - name: Alpha-One Security Scan
      run: |
        echo "Running Monad-Ready Protocol..."
        exit 0
