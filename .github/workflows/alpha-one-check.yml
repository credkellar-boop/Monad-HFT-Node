name: Alpha-One Integrity Check

on:
  push:
    branches: [ "main" ]

jobs:
  validate-sovereign-stack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Build Check
        run: |
          # The file is now correctly named cargo.toml
          find . -name "cargo.toml" -execdir cargo check --verbose \;

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Python Dependency Check
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Go Controller Check
        run: |
          if [ -d "go-control" ]; then
            cd go-control
            if [ ! -f go.mod ]; then go mod init go-control; fi
            go mod tidy
            go build -v ./...
          fi
