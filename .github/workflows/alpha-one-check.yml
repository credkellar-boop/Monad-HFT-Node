name: Alpha-One Integrity Check

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    # Corrected Rust Setup
    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
    - name: Rust Syntax Check
      run: cargo check --verbose

    # Python Logic Check
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Install Python Dependencies
      run: |
        pip install -r requirements.txt

    # Go Bridge Check
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.20'
    - name: Go Build Check
      run: go build ./go-control/...
