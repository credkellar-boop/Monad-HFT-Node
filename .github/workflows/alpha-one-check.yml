name: Alpha-One Integrity Check

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  # FIX: Resolves the Node.js 20 deprecation warning
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # FIX: Corrects the Go build by ensuring the workspace is initialized
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'
    - name: Go Build Check
      working-directory: ./go-control
      run: |
        if [ -f go.mod ]; then
          go build ./...
        else
          echo "Warning: go.mod not found in go-control. Initializing..."
          go mod init go-control
          go build ./...
        fi

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install Python Dependencies
      run: |
        if [ -f requirements.txt ]; then
          pip install -r requirements.txt
        fi

    # FIX: Handles Rust if Cargo.toml is in the root OR src folder
    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
    - name: Rust Syntax Check
      run: |
        if [ -f "Cargo.toml" ]; then
          cargo check --verbose
        elif [ -f "src/Cargo.toml" ]; then
          cd src && cargo check --verbose
        else
          echo "Error: Cargo.toml not found. Please move it to the root directory."
          exit 1
        fi
